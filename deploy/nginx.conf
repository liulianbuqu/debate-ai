# ============================================
# Nginx 反向代理配置示例
# 部署到域名时使用
# ============================================
# 用法：
#   1. 将本文件复制到 /etc/nginx/sites-available/debate-ai
#   2. 修改 server_name 为你的域名
#   3. 运行 certbot 设置 HTTPS
#   4. ln -s /etc/nginx/sites-available/debate-ai /etc/nginx/sites-enabled/
#   5. nginx -t && systemctl restart nginx

server {
    listen 80;
    server_name your-domain.com;  # 改为你的域名

    # 重定向到 HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # SSL 证书（使用 certbot 自动获取）
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # 静态文件缓存
    location /css/ {
        proxy_pass http://127.0.0.1:8000;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    location /js/ {
        proxy_pass http://127.0.0.1:8000;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # API 代理
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 前端页面
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
